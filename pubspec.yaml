name: field_tracker
description: A field technician GPS tracking app for service orders. 100% offline with SQLite and OpenStreetMap.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^13.0.2
  permission_handler: ^12.0.1
  shared_preferences: ^2.2.2
  intl: ^0.20.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  sqflite: ^2.4.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
